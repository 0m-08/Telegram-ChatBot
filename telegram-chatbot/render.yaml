# render.yaml — Render deployment configuration
# Render reads this file to know how to build and run your bot.

services:
  - type: worker          # "worker" = background process (no HTTP port needed)
    name: dialogpt-telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false       # You will paste the value manually in Render dashboard
    plan: free
